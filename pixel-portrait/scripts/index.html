<!DOCTYPE html>
<html lang="en">
<head></head>
<body>
<script>
window['ai_edge_gallery_get_result'] = async (dataStr) => {
    try {
        const jsonData = JSON.parse(dataStr || '{}');
        const title = jsonData.title || 'Pixel Art';
        const colors = jsonData.colors || {};
        const rows = jsonData.rows || [];

        if (!Array.isArray(rows) || rows.length === 0) {
            return JSON.stringify({ error: 'No row data provided.' });
        }

        const size = rows.length;

        // Convert character matrix to pixel array
        const pixels = [];
        const palette = [];
        const paletteSet = new Set();

        for (const row of rows) {
            for (let i = 0; i < size; i++) {
                const ch = i < row.length ? row[i] : '.';
                const color = colors[ch] || '';
                if (ch === '.' || !color) {
                    pixels.push('#0');
                } else {
                    pixels.push(color);
                    if (!paletteSet.has(color)) {
                        paletteSet.add(color);
                        palette.push(color);
                    }
                }
            }
        }

        const payload = JSON.stringify({ title, palette, pixels, size });
        const encoded = btoa(unescape(encodeURIComponent(payload)));
        const fullUrl = `webview.html?d=${encoded}&v=${Date.now()}`;

        return JSON.stringify({
            webview: { url: fullUrl, aspectRatio: 0.85 },
            result: `Pixel art "${title}" is ready! Tap the preview card to view it.`
        });
    } catch (e) {
        console.error(e);
        return JSON.stringify({ error: `Failed: ${e.message}` });
    }
};
</script>
</body>
</html>
